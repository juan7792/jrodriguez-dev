<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <!-- Suave degradado tipo “metal claro” -->
    <linearGradient id="jrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#eef2f6"/>
      <stop offset="100%" stop-color="#d7dee6"/>
    </linearGradient>

    <!-- Sombra muy sutil (opcional, parecida al render del ejemplo) -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Fondo transparente (no dibujamos rectángulo de fondo) -->

  <!-- Monograma -->
  <g filter="url(#softShadow)">
    <text
      x="50%"
      y="52%"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Montserrat, Poppins, Arial, sans-serif"
      font-weight="800"
      font-size="320"
      letter-spacing="-28"
      fill="url(#jrGrad)"
      stroke="#c9d1da"
      stroke-width="3"
      paint-order="stroke fill"
    >JR</text>
  </g>
</svg>